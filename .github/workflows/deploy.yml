name: Deploy WAST Temple to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Firebase config
        run: |
          cat > js/firebase-config.js << EOF
          export const firebaseConfig = {
            apiKey:            "${{ secrets.FIREBASE_API_KEY }}",
            authDomain:        "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            projectId:         "${{ secrets.FIREBASE_PROJECT_ID }}",
            storageBucket:     "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            appId:             "${{ secrets.FIREBASE_APP_ID }}"
          };
          export const VAPID_KEY = "YOUR_VAPID_KEY";
          export const BREVO_API_KEY = "YOUR_BREVO_API_KEY";
          export const BREVO_LIST_ID = 1;
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4